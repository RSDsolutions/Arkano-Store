<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          void: '#0B0C11',
          surface: '#15161E',
          elevated: '#1C1D28',
          borderd: '#2A2B38',
          borderh: '#3A3B50',
          gold: '#DFBC60',
          copper: '#AE733B',
          goldsoft: '#D6B47C',
          goldmut: '#8A7A5A',
          blue: '#43AABE',
          bluehover: '#2A8A9E',
          bluedim: '#7AC8D8',
          warm: '#F5F0E8',
          off: '#D8D0C0',
          promo: '#FF4444',
          confirm: '#4CAF50',
          amber: '#FFB800',
          wa: '#25D366',
        },
        fontFamily: {
          head: ['Rajdhani', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
        },
      },
    },
  };
</script>
<style>
  html { scroll-behavior: smooth; }
  body { background: #0B0C11; color: #F5F0E8; font-family: 'Inter', sans-serif; }
  ::selection { background: rgba(223,188,96,0.3); color: #fff; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: #0B0C11; }
  ::-webkit-scrollbar-thumb { background: #2A2B38; border-radius: 6px; border: 2px solid #0B0C11; }
  ::-webkit-scrollbar-thumb:hover { background: #3A3B50; }

  .font-head { font-family: 'Rajdhani', sans-serif; }

  /* Gold shimmer headline text */
  .shimmer {
    background: linear-gradient(90deg, #AE733B, #DFBC60, #F5E0A0, #DFBC60, #AE733B);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shimmer 4.5s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }

  /* Gold outline (stroke) numerals */
  .stroke-gold { -webkit-text-stroke: 2px #DFBC60; color: transparent; }
  .stroke-blue { -webkit-text-stroke: 2px #43AABE; color: transparent; }
  .stroke-amber { -webkit-text-stroke: 2px #FFB800; color: transparent; }

  /* Page enter */
  .page-enter { animation: pageIn 260ms ease both; }
  @keyframes pageIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* WhatsApp pulse ring */
  .wa-ring::before {
    content: ''; position: absolute; inset: 0; border-radius: 999px;
    border: 2px solid rgba(223,188,96,0.7);
    animation: waPulse 5s ease-out infinite;
  }
  @keyframes waPulse {
    0% { transform: scale(1); opacity: 0.8; }
    18% { transform: scale(1.65); opacity: 0; }
    100% { transform: scale(1.65); opacity: 0; }
  }

  /* Flashing promo badge */
  .flash { animation: flash 1.4s steps(1,end) infinite; }
  @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Live ticker marquee */
  .ticker-track { display: inline-flex; white-space: nowrap; animation: ticker 32s linear infinite; }
  .ticker-wrap:hover .ticker-track { animation-play-state: paused; }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* Loot box shine sweep on hover */
  .loot { position: relative; overflow: hidden; }
  .loot::after {
    content: ''; position: absolute; top: 0; left: -120%; width: 70%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(245,224,160,0.18), transparent);
    transform: skewX(-18deg); transition: none; pointer-events: none;
  }
  .loot:hover::after { animation: shine 0.85s ease; }
  @keyframes shine { from { left: -120%; } to { left: 130%; } }

  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* FAQ accordion */
  .acc-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 280ms ease; }
  .acc-body.open { grid-template-rows: 1fr; }
  .acc-body > div { overflow: hidden; }

  details summary::-webkit-details-marker { display: none; }
</style>
</head>
